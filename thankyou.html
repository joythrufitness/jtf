<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Thank You — Joy Thru Fitness</title>
<meta name="robots" content="noindex, nofollow"/>
<link rel="icon" href="images/favicon.png" type="image/png"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Open Sans',sans-serif;background:#111;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px}
.logo{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:#e93e3a;margin-bottom:48px}
.icon{font-size:48px;margin-bottom:24px}
h1{font-family:'Montserrat',sans-serif;font-size:clamp(24px,4vw,40px);font-weight:800;text-transform:uppercase;letter-spacing:-.01em;margin-bottom:16px}
h1 span{color:#e93e3a}
p{font-size:16px;color:rgba(255,255,255,.6);max-width:440px;line-height:1.8;margin-bottom:40px}
a{display:inline-block;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;padding:14px 32px;border-radius:3px;background:#e93e3a;color:#fff;text-decoration:none;transition:background .2s}
a:hover{background:#c42e2a}
</style>
</head>
<body>
  <div class="logo">Joy Thru Fitness</div>
  <div class="icon">🏅</div>
  <h1>You're one step closer to <span>your goals</span></h1>
  <p>Thanks for reaching out! We've received your message and will be in touch shortly to find the right plan for you.</p>
  <a href="/">Back to Home</a>
</body>
</html>
